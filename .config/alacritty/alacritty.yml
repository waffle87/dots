# Configuration for Alacritty, the GPU enhanced terminal emulator.

env:
  TERM: alacritty

# Window configuration
window:
  padding:
    x: 7
    y: 0
  opacity: 1.0
  startup_mode: Windowed
  title: Alacritty
  dynamic_title: true
  gtk_theme_variant: None

scrolling:
  history: 10000
  multiplier: 3 # How many lines to jump when scrolling

# Font configuration
font:
  normal:
    family: JetBrains Mono
    style: Regular

  bold:
    family: JetBrains Mono
    style: Bold

  italic:
    family: JetBrains Mono
    style: Italic 

  bold_italic:
    family: JetBrains Mono
    style: Bold Italic

  size: 12

# Colors (Solarized Dark)
colors:
  # Default colors
  primary:
    background: '#002b36' # base03
    foreground: '#839496' # base0

  # Cursor colors
  cursor:
    text:   '#002b36' # base03
    cursor: '#839496' # base0

  # Normal colors
  normal:
    black:   '#073642' # base02
    red:     '#dc322f' # red
    green:   '#859900' # green
    yellow:  '#b58900' # yellow
    blue:    '#268bd2' # blue
    magenta: '#d33682' # magenta
    cyan:    '#2aa198' # cyan
    white:   '#eee8d5' # base2

  # Bright colors
  bright:
    black:   '#002b36' # base03
    red:     '#cb4b16' # orange
    green:   '#586e75' # base01
    yellow:  '#657b83' # base00
    blue:    '#839496' # base0
    magenta: '#6c71c4' # violet
    cyan:    '#93a1a1' # base1
    white:   '#fdf6e3' # base3

selection:
  save_to_clipboard: true

cursor:
  shape: Block
  blinking: Off
  unfocused_hollow: true
  thickness: 0.15

live_config_reload: true

# Shell
shell:
  program: /usr/bin/zsh

mouse:
  hide_when_typing: false
