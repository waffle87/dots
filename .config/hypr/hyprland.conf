# desktop configuration

monitor=DP-3,1920x1080@143.855,0x0,1

exec-once = waybar & mako & easyeffects --gapplication-service & swaybg -o DP-3 -i .img/wallpaper/isometric.png

input {
    kb_layout = us,ru
    kb_options = grp:alts_toggle
}

misc {
    disable_hyprland_logo = true
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    col.active_border = rgba(2aa198ee) rgba(268bd2ee) 45deg
    col.inactive_border = rgba(586e75aa)
    layout = dwindle
}

decoration {
    rounding = 8
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 10, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
    permanent_direction_override = true
}

bind = SUPER, Q, killactive,
bind = SUPER, T, exec, st
bind = SUPER, F, exec, firefox
bind = SUPER, R, exec, wofi
bind = SUPER, P, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER_SHIFT, P, exec, grim -g "$(slurp)"
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = SUPER_SHIFT, E, exit,
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d
bind = SUPER_SHIFT, H, movewindow, l
bind = SUPER_SHIFT, L, movewindow, r
bind = SUPER_SHIFT, K, movewindow, u
bind = SUPER_SHIFT, J, movewindow, d
bind = SUPER_SHIFT, SPACE, togglefloating
bind = SUPER_SHIFT, F, fullscreen
bind = SUPER, E, togglesplit
bind = SUPER, S, togglegroup
bind = SUPER, N, movetoworkspace, special
bind = SUPER_SHIFT, N, togglespecialworkspace

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER_SHIFT, 1, movetoworkspace, 1
bind = SUPER_SHIFT, 2, movetoworkspace, 2
bind = SUPER_SHIFT, 3, movetoworkspace, 3
bind = SUPER_SHIFT, 4, movetoworkspace, 4
bind = SUPER_SHIFT, 5, movetoworkspace, 5

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
